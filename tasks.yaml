version: 1
project: orchestos
tasks:
  - id: crypto-page-v1
    description: "Build ONE self-contained HTML page at demo/crypto-page/index.html — a premium-looking, dark-mode
      cryptocurrency price dashboard for the top 10 coins by market cap. Fetch LIVE data from the free CoinGecko API (no
      key required):
      https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=10&page=1&sparkline\
      =true&price_change_percentage=24h For each coin show: rank, logo (image field from the API), name, current price,
      24h % change (green if positive, red if negative), market cap, and a small 7-day sparkline line chart drawn from
      the sparkline_in_7d.price array (inline SVG or a small canvas — no build tooling, no npm install, everything must
      run by double-clicking the HTML file and opening it in a browser). Visual direction inspired by coinmarketcap.com
      but distinctive, not a clone: dark background, clear typographic hierarchy, generous spacing, subtle
      hover/transition animations, fully responsive down to mobile width. No placeholder/fake prices — must be the real
      API response."
    skill: frontend-design
    executor: openrouter
    executor_model: anthropic/claude-sonnet-5
    engine: single-shot
    input: []
    output:
      - demo/crypto-page/index.html
    acceptance_criteria:
      - WHEN the page loads THEN it fetches live data from the CoinGecko markets API — no hardcoded/fake coin prices
      - WHEN the data loads THEN it displays the top 10 coins with rank, price, 24h % change (color-coded), and market
        cap
      - WHEN each coin renders THEN it includes a 7-day sparkline chart from the API's sparkline_in_7d data
      - WHEN the page is styled THEN it uses a dark, premium visual design — not default unstyled HTML
      - WHEN viewed at mobile width THEN the layout adapts responsively without horizontal overflow
    checks:
      - cmd: test -s demo/crypto-page/index.html
      - cmd: grep -qi coingecko demo/crypto-page/index.html
    depends_on: []
    status: done
    retry_count: 0
    qa_verdict: pass
    run_id: ffd3116c-e40b-4788-bbf5-0fa7b59294f9
