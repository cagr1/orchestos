version: 1
project: orchestos
tasks:
  - id: s21-6-integrate-resolvers
    description: >
      Integrate the four language resolvers (C#, Rust, Go, Java) into src/graph/index.ts.

      The resolvers are already implemented in:
        - src/graph/resolvers/csharp.ts  (exports: csharpResolver)
        - src/graph/resolvers/rust.ts    (exports: rustResolver)
        - src/graph/resolvers/go.ts      (exports: goResolver)
        - src/graph/resolvers/java.ts    (exports: javaResolver)
        - src/graph/resolver-registry.ts (exports: registerResolver, resolveWithRegistry, RepoIndex, RepoFile)

      In src/graph/index.ts, make these changes: 1. At the top, import all four resolvers and registerResolver from the
      paths above. 2. Register all four resolvers once at module load time (outside any function):
           registerResolver(csharpResolver)
           registerResolver(rustResolver)
           registerResolver(goResolver)
           registerResolver(javaResolver)
      3. Inside the indexProject() loop, after computing toPath with resolveImport():
         - Build a RepoIndex object: { projectRoot, projectId, files: [] } where files[]
           is the list of already-indexed files as { path, language } objects.
           NOTE: this list can be built from the `files` array (local variable) using languageFor().
         - Call resolveWithRegistry(language, edge.specifier, file, repoIndex) to get toFileId.
         - If it returns a non-null path, use resolveFileId(projectId, that path) as toFileId.
         - Otherwise fall back to the current toFileId logic.
      4. Do NOT change any other logic. Do NOT remove existing extractors or resolveImport().

      The languageFor() function already exists in the file — use it to get the language for each file path.
    executor: openrouter
    executor_model: deepseek/deepseek-r1
    input:
      - src/graph/index.ts
      - src/graph/resolver-registry.ts
      - src/graph/resolvers/csharp.ts
      - src/graph/resolvers/rust.ts
      - src/graph/resolvers/go.ts
      - src/graph/resolvers/java.ts
    output:
      - src/graph/index.ts
    checks:
      - cmd: bun run typecheck
        expect_exit: 0
      - cmd: bun test
        expect_exit: 0
    depends_on: []
    status: running
    retry_count: 0
