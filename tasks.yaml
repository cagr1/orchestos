  - id: s21-8-skills-fetch
    description: >
      Create src/skills/fetch.ts that fetches skills from the autoskills registry on GitHub.

      The autoskills registry is at: https://raw.githubusercontent.com/midudev/autoskills/main/skills/<lang>/<name>.yaml

      Implement these exports:

      export async function fetchSkill(language: string, name: string): Promise<string>
        - Fetches https://raw.githubusercontent.com/midudev/autoskills/main/skills/<language>/<name>.yaml
        - Saves the YAML content to .orchestos/cache/skills/<language>/<name>.yaml (create dirs as needed)
        - Returns the raw YAML string
        - Throws with a clear message if the HTTP request fails (404, network error, etc.)

      export async function listRemoteSkills(language: string): Promise<string[]>
        - Fetches https://api.github.com/repos/midudev/autoskills/contents/skills/<language>
        - Parses the JSON array and returns filenames without the .yaml extension
        - Returns [] if the language directory does not exist (404)

      export function getCachedSkillPath(language: string, name: string, cacheDir: string): string
        - Returns the absolute path: <cacheDir>/<language>/<name>.yaml

      Use only Bun.fetch() (available globally in Bun runtime). No external HTTP libraries. Cache directory root:
      join(homedir(), '.orchestos', 'cache', 'skills')  — use os.homedir().
    executor: openrouter
    executor_model: deepseek/deepseek-r1
    input: []
    output:
      - src/skills/fetch.ts
    checks:
      - cmd: bun run typecheck
        expect_exit: 0
    depends_on: []
    status: pending
    retry_count: 0
  - id: s21-9-10-skill-fetch-cli
    description: |
      Add `orchestos skill fetch` command to src/cli.ts.
      Import fetchSkill and listRemoteSkills from './skills/fetch.ts'.
      Add these subcommands under the existing `skill` command group (already exists in cli.ts):
      skill fetch --language <lang> [--name <name>]
        - If --name provided: calls fetchSkill(language, name), saves to skills/<name>.yaml
          in the orchestos project skills/ directory (relative to cwd), prints success message
        - If --name not provided: calls listRemoteSkills(language), prints each skill name

      skill fetch --list
        - Lists all skills available for all languages by calling listRemoteSkills for common languages:
          typescript, javascript, python, rust, go, java, csharp
          Prints: "<language>: skill1, skill2, ..."

      Do NOT modify any existing commands. Only add the new subcommands. The skill command group is already defined as:
        const skill = program.command('skill').description('Manage skills')
      Add to that group.
    executor: openrouter
    executor_model: deepseek/deepseek-r1
    input:
      - src/cli.ts
      - src/skills/fetch.ts
    output:
      - src/cli.ts
    checks:
      - cmd: bun run typecheck
        expect_exit: 0
    depends_on:
      - s21-8-skills-fetch
    status: pending
    retry_count: 0
