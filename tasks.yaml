  - id: s21-8-skills-fetch
    description: >
      Create src/skills/fetch.ts that fetches skills from the autoskills registry on GitHub.

      The autoskills registry is at: https://raw.githubusercontent.com/midudev/autoskills/main/skills/<lang>/<name>.yaml

      Implement these exports:

      export async function fetchSkill(language: string, name: string): Promise<string>
        - Fetches https://raw.githubusercontent.com/midudev/autoskills/main/skills/<language>/<name>.yaml
        - Saves the YAML content to .orchestos/cache/skills/<language>/<name>.yaml (create dirs as needed)
        - Returns the raw YAML string
        - Throws with a clear message if the HTTP request fails (404, network error, etc.)

      export async function listRemoteSkills(language: string): Promise<string[]>
        - Fetches https://api.github.com/repos/midudev/autoskills/contents/skills/<language>
        - Parses the JSON array and returns filenames without the .yaml extension
        - Returns [] if the language directory does not exist (404)

      export function getCachedSkillPath(language: string, name: string, cacheDir: string): string
        - Returns the absolute path: <cacheDir>/<language>/<name>.yaml

      Use only Bun.fetch() (available globally in Bun runtime). No external HTTP libraries. Cache directory root:
      join(homedir(), '.orchestos', 'cache', 'skills')  — use os.homedir().
    executor: openrouter
    executor_model: deepseek/deepseek-v4-flash
    input: []
    output:
      - src/skills/fetch.ts
    checks:
      - cmd: bun run typecheck
        expect_exit: 0
    depends_on: []
    status: done
    retry_count: 0
    qa_verdict: pass
    run_id: 01911ecb-67de-408c-b155-b2c7a61fbab4
  - id: s21-9-10-skill-fetch-cli
    description: >
      Create a NEW file src/cli-skill-fetch.ts that registers the "skill fetch" subcommands. Do NOT touch src/cli.ts.

      The file must export one function: registerSkillFetchCommands(skill: Command): void where Command is imported from
      'commander'.

      The function registers two subcommands on the `skill` Command object:

      1. skill.command('fetch').description('Fetch or list skills from the autoskills registry')
         .option('--language <lang>', 'Language to fetch skills for')
         .option('--name <name>', 'Skill name to download')
         .option('--list', 'List available skills for common languages')
         .action(async (opts) => { ... })

      Inside the action: - Import fetchSkill and listRemoteSkills from './skills/fetch.ts' - If opts.list is true: call
      listRemoteSkills for each of these languages:
          ['typescript', 'javascript', 'python', 'rust', 'go', 'java', 'csharp']
          Print each as: "<language>: skill1, skill2, ..."  (join with ", ")
          If empty print: "<language>: (no skills found)"
      - Else if opts.language and opts.name: call fetchSkill(opts.language, opts.name)
          Save the result to join(process.cwd(), 'skills', opts.name + '.yaml') using writeFileSync
          Create the skills/ dir if it does not exist (mkdirSync recursive)
          Print: "[skill] Downloaded <name> → skills/<name>.yaml"
      - Else if opts.language (no --name): call listRemoteSkills(opts.language)
          Print each skill name on its own line
      - Else: print usage error

      Use top-level imports: import { Command } from 'commander', import { writeFileSync, mkdirSync, existsSync } from
      'fs', import { join } from 'path' Import fetchSkill and listRemoteSkills lazily inside the action (dynamic import
      is fine) or at top level.
    executor: openrouter
    executor_model: deepseek/deepseek-v4-flash
    input:
