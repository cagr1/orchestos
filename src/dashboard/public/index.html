<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OrchestOS — Dashboard</title>
  <script src="theme.js"></script>
  <link rel="icon" href="assets/logo_white.png" media="(prefers-color-scheme: dark)">
  <link rel="icon" href="assets/logo_black.png" media="(prefers-color-scheme: light)">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="screens.css">
</head>
<body data-cards="flat">
  <div class="app">

    <!-- SIDEBAR — brand (solo texto, sin logo) + panel-left + search viven acá
         (2026-07-13, corrección de Carlos): buildNav() los inyecta como una fila al
         tope del riel de íconos. Colapsado, solo queda el ícono panel-left. -->
    <nav class="sidebar" id="sidebar"></nav>
    <div class="resize-handle resize-handle-sidebar" id="sidebarResizeHandle"></div>

    <!-- HEADER — sin borde inferior, sin contador "N active" (2026-07-13,
         corrección de Carlos ronda 3). El único ícono que queda acá es el
         toggle del panel derecho, al final de todo (después del pill IDLE) —
         explorer/terminal/diff se mudaron al toprow del aside mismo. -->
    <header class="header">
      <span class="spacer"></span>
      <div class="status-badge" id="statusBadge" data-state="idle">
        <span class="dot"></span><span class="txt">IDLE</span>
      </div>
      <div class="header-icons" id="headerRightIcons"></div>
    </header>

    <!-- MAIN -->
    <main class="main" id="main"></main>

    <!-- RIGHT PANEL — explorer / terminal / diff. Ahora ocupa toda la altura
         (mismo grid-area que el sidebar, ver .app[data-rightpanel="expanded"])
         y tiene su propio toprow con las 3 vistas + cerrar, todo a la
         izquierda (2026-07-13, corrección de Carlos ronda 3). -->
    <aside class="rightpanel" id="rightpanel">
      <div class="rp-toprow" id="rpToprow"></div>
      <div class="rp-body" id="rightpanelBody"></div>
    </aside>
    <div class="resize-handle resize-handle-rightpanel" id="rightpanelResizeHandle"></div>

  </div>

  <script src="marked.umd.js"></script>
  <script src="i18n.js"></script>
  <script src="data.js"></script>
  <script src="screens-core.js"></script>
  <script src="screens-ops.js"></script>
  <script src="app.js"></script>
</body>
</html>
