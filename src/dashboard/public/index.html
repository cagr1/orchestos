<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OrchestOS — Dashboard</title>
  <script src="theme.js"></script>
  <link rel="icon" href="assets/logo_white.png" media="(prefers-color-scheme: dark)">
  <link rel="icon" href="assets/logo_black.png" media="(prefers-color-scheme: light)">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="screens.css">
</head>
<body data-cards="flat">
  <div class="app">

    <!-- SIDEBAR -->
    <nav class="sidebar" id="sidebar"></nav>

    <!-- HEADER -->
    <header class="header">
      <div class="brand">
        <span class="mark">
          <img class="logo-dark" src="assets/logo_white.png" alt="" aria-hidden="true">
          <img class="logo-light" src="assets/logo_black.png" alt="" aria-hidden="true">
        </span>
        <b>Orchest<span>OS</span></b>
      </div>
      <span class="screen-title mono">localhost:4242</span>

      <span class="spacer"></span>

      <div class="status-badge" id="statusBadge" data-state="idle">
        <span class="dot"></span><span class="txt">IDLE</span>
      </div>
      <span class="active-counter" id="activeCount"><b>0</b> active</span>
    </header>

    <!-- MAIN -->
    <main class="main" id="main"></main>

    <!-- TERMINAL FOOTER -->
    <section class="terminal collapsed" id="terminal">
      <div class="bar" id="termBar">
        <span class="chev" id="termChev"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span>
        <span class="t-label"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 7 9 12 4 17"/><line x1="12" y1="17" x2="19" y2="17"/></svg> Recent Runs</span>
        <span class="live" id="termLive">● live</span>
      </div>
      <div class="body" id="termBody"></div>
    </section>

  </div>

  <script src="marked.umd.js"></script>
  <script src="i18n.js"></script>
  <script src="data.js"></script>
  <script src="screens-core.js"></script>
  <script src="screens-ops.js"></script>
  <script src="app.js"></script>
</body>
</html>
