<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Runs — OrchestOS Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; padding: 2rem; }
  h1 { font-size: 1.3rem; margin-bottom: 1rem; color: #58a6ff; }
  a { color: #58a6ff; text-decoration: none; font-size: .85rem; }
  a:hover { text-decoration: underline; }
  table { width: 100%; border-collapse: collapse; font-size: .82rem; }
  th { text-align: left; padding: .5rem .6rem; border-bottom: 1px solid #30363d; color: #8b949e; font-weight: 600; white-space: nowrap; }
  td { padding: .5rem .6rem; border-bottom: 1px solid #21262d; vertical-align: top; }
  tr:hover { background: #161b22; }
  .badge { display: inline-block; padding: .1rem .45rem; border-radius: 3px; font-size: .75rem; font-weight: 600; }
  .badge-done { background: #1b4a1b; color: #7ee787; }
  .badge-failed { background: #4a1b1b; color: #f87171; }
  .badge-blocked { background: #4a351b; color: #fbbf6a; }
  .cost-breakdown { font-size: .78rem; color: #8b949e; margin-top: .2rem; }
  .warnings { font-size: .78rem; color: #fbbf6a; margin-top: .2rem; }
  .mono { font-family: 'SF Mono', 'Fira Code', monospace; font-size: .78rem; }
  #loading { color: #8b949e; padding: 2rem; text-align: center; }
</style>
</head>
<body>
<h1>Runs</h1>
<a href="/">&larr; Dashboard</a>
<div id="loading">Loading runs...</div>
<table id="runs-table" style="display:none">
  <thead>
    <tr>
      <th>Status</th>
      <th>Task ID</th>
      <th>Model</th>
      <th>In</th>
      <th>Out</th>
      <th style="text-align:right">Cost</th>
      <th>Cost Breakdown</th>
      <th>Warnings</th>
      <th>Date</th>
    </tr>
  </thead>
  <tbody id="runs-body"></tbody>
</table>
<script>
async function load() {
  try {
    const res = await fetch('/api/runs')
    const runs = await res.json()
    if (runs.length === 0) {
      document.getElementById('loading').textContent = 'No runs yet.'
      return
    }
    document.getElementById('loading').style.display = 'none'
    const table = document.getElementById('runs-table')
    const tbody = document.getElementById('runs-body')
    table.style.display = ''

    for (const r of runs) {
      const statusBadge = `<span class="badge badge-${r.status}">${r.status}</span>`
      const qaInfo = r.qaVerdict ? ` [qa:${r.qaVerdict}]` : ''

      let breakdownHtml = ''
      if (r.costBreakdown && r.costBreakdown.length > 1) {
        breakdownHtml = '<div class="cost-breakdown">'
        for (const e of r.costBreakdown) {
          breakdownHtml += `${e.label}: ${e.inputTokens}/${e.outputTokens} $${e.costUsd.toFixed(6)}<br>`
        }
        breakdownHtml += '</div>'
      }

      let warningsHtml = ''
      if (r.contextWarnings && r.contextWarnings.length > 0) {
        warningsHtml = '<div class="warnings">'
        for (const w of r.contextWarnings) {
          warningsHtml += `[${w.severity}] ${w.code}: ${w.message}<br>`
        }
        warningsHtml += '</div>'
      }

      const tr = document.createElement('tr')
      tr.innerHTML = `
        <td>${statusBadge}${qaInfo}</td>
        <td class="mono">${r.taskId ?? '-'}</td>
        <td>${r.model}</td>
        <td class="mono">${r.inputTokens}</td>
        <td class="mono">${r.outputTokens}</td>
        <td class="mono" style="text-align:right">$${r.costUsd.toFixed(6)}</td>
        <td>${breakdownHtml || '<span style="color:#8b949e">single agent</span>'}</td>
        <td>${warningsHtml || '<span style="color:#8b949e">none</span>'}</td>
        <td class="mono">${r.createdAt.slice(0, 19)}</td>
      `
      tbody.appendChild(tr)
    }
  } catch (e) {
    document.getElementById('loading').textContent = 'Error loading runs: ' + e.message
  }
}
load()
</script>
</body>
</html>
