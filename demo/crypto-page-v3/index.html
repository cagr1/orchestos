<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto Terminal — Live Price Monitor</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: oklch(8% 0 0);
      color: oklch(93% 0 0);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      line-height: 1.5;
      font-size: 13px;
    }

    .container {
      max-width: 100%;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      gap: 16px;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: oklch(68% 0 0);
    }

    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: oklch(68% 0.18 142);
      animation: pulse-live 2s ease-in-out infinite;
    }

    @keyframes pulse-live {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .search-box {
      position: relative;
      width: 100%;
      max-width: 320px;
    }

    .search-box input {
      width: 100%;
      padding: 8px 12px;
      background-color: oklch(12% 0 0);
      border: 1px solid oklch(18% 0 0);
      border-radius: 4px;
      color: oklch(93% 0 0);
      font-family: inherit;
      font-size: 13px;
    }

    .search-box input::placeholder {
      color: oklch(50% 0 0);
    }

    .search-box input:focus {
      outline: none;
      border-color: oklch(68% 0.18 142);
      box-shadow: 0 0 0 2px oklch(68% 0.18 142 / 0.15);
    }

    .table-wrapper {
      overflow-x: auto;
      border-radius: 4px;
      border: 1px solid oklch(18% 0 0);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-feature-settings: "tnum";
      font-variant-numeric: tabular-nums;
    }

    thead {
      background-color: oklch(12% 0 0);
      border-bottom: 1px solid oklch(18% 0 0);
    }

    th {
      padding: 10px 12px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      color: oklch(68% 0 0);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }

    th:hover {
      background-color: oklch(18% 0 0);
    }

    .sort-indicator {
      display: inline-block;
      margin-left: 4px;
      font-size: 10px;
      color: oklch(68% 0.18 142);
    }

    tbody {
      background-color: oklch(8% 0 0);
    }

    tr {
      border-bottom: 1px solid oklch(14% 0 0);
      transition: background-color 150ms ease-out;
    }

    tbody tr:hover {
      background-color: oklch(12% 0 0);
    }

    td {
      padding: 10px 12px;
      font-size: 13px;
    }

    .rank {
      color: oklch(68% 0 0);
      font-weight: 500;
      width: 50px;
    }

    .coin-info {
      min-width: 140px;
    }

    .coin-name {
      font-weight: 600;
      color: oklch(93% 0 0);
    }

    .coin-symbol {
      font-size: 11px;
      color: oklch(68% 0 0);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 2px;
    }

    .price {
      font-size: 15px;
      font-weight: 600;
      color: oklch(93% 0 0);
      transition: all 250ms ease-out;
      font-family: 'Monaco', 'Menlo', 'Courier New', monospace;
    }

    .price.pulse-gain {
      animation: pulse-cell-gain 250ms ease-out;
    }

    .price.pulse-loss {
      animation: pulse-cell-loss 250ms ease-out;
    }

    @keyframes pulse-cell-gain {
      0% { background-color: oklch(68% 0.18 142 / 0.3); }
      100% { background-color: transparent; }
    }

    @keyframes pulse-cell-loss {
      0% { background-color: oklch(62% 0.16 25 / 0.3); }
      100% { background-color: transparent; }
    }

    @media (prefers-reduced-motion: reduce) {
      .price.pulse-gain,
      .price.pulse-loss {
        animation: none;
        opacity: 0.9;
      }
    }

    .change-24h {
      font-size: 13px;
      font-weight: 600;
      font-family: 'Monaco', 'Menlo', 'Courier New', monospace;
      min-width: 70px;
      text-align: right;
    }

    .change-gain {
      color: oklch(68% 0.18 142);
    }

    .change-loss {
      color: oklch(62% 0.16 25);
    }

    .market-cap,
    .volume {
      color: oklch(68% 0 0);
      text-align: right;
      min-width: 110px;
      font-size: 12px;
    }

    .sparkline-cell {
      width: 80px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sparkline-chart {
      display: block;
    }

    .skeleton {
      background: linear-gradient(
        90deg,
        oklch(12% 0 0) 0%,
        oklch(18% 0 0) 50%,
        oklch(12% 0 0) 100%
      );
      background-size: 200% 100%;
      animation: skeleton-load 1.2s ease-in-out infinite;
      border-radius: 3px;
    }

    @keyframes skeleton-load {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .skeleton-row td {
      padding: 10px 12px;
    }

    .skeleton-text {
      height: 16px;
      background-color: oklch(18% 0 0);
      border-radius: 3px;
      margin: 2px 0;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: oklch(68% 0 0);
    }

    .empty-state p {
      font-size: 14px;
    }

    @media (max-width: 768px) {
      .container {
        padding: 12px;
      }

      .header {
        flex-direction: column;
        align-items: flex-start;
        margin-bottom: 16px;
      }

      .header h1 {
        font-size: 16px;
      }

      .search-box {
        max-width: 100%;
      }

      table {
        font-size: 12px;
      }

      th, td {
        padding: 8px 10px;
      }

      .price {
        font-size: 14px;
      }

      .market-cap,
      .volume {
        display: none;
      }

      .sparkline-cell {
        width: 60px;
        height: 32px;
      }

      .coin-info {
        min-width: 100px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>Crypto Terminal</h1>
        <div class="status-badge">
          <span class="status-dot"></span>
          <span id="statusText">Connecting...</span>
        </div>
      </div>
      <div class="search-box">
        <input
          type="text"
          id="searchInput"
          placeholder="Search by name or symbol..."
          aria-label="Search cryptocurrencies"
        >
      </div>
    </div>

    <div class="table-wrapper">
      <table id="cryptoTable">
        <thead>
          <tr>
            <th class="rank" data-sort="rank">#</th>
            <th data-sort="name">Coin</th>
            <th data-sort="price">Price</th>
            <th data-sort="change24h">24h Change</th>
            <th data-sort="marketCap">Market Cap</th>
            <th data-sort="volume">24h Volume</th>
            <th>7d Chart</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <!-- Skeleton rows -->
          <tr class="skeleton-row">
            <td><div class="skeleton-text" style="width: 30px;"></div></td>
            <td><div class="skeleton-text" style="width: 90px;"></div></td>
            <td><div class="skeleton-text" style="width: 80px;"></div></td>
            <td><div class="skeleton-text" style="width: 60px;"></div></td>
            <td><div class="skeleton-text" style="width: 100px;"></div></td>
            <td><div class="skeleton-text" style="width: 100px;"></div></td>
            <td><div class="skeleton-text" style="width: 60px;"></div></td>
          </tr>
          <tr class="skeleton-row">
            <td><div class="skeleton-text" style="width: 30px;"></div></td>
            <td><div class="skeleton-text" style="width: 90px;"></div></td>
            <td><div class="skeleton-text" style="width: 80px;"></div></td>
            <td><div class="skeleton-text" style="width: 60px;"></div></td>
            <td><div class="skeleton-text" style="width: 100px;"></div></td>
            <td><div class="skeleton-text" style="width: 100px;"></div></td>
            <td><div class="skeleton-text" style="width: 60px;"></div></td>
          </tr>
          <tr class="skeleton-row">
            <td><div class="skeleton-text" style="width: 30px;"></div></td>
            <td><div class="skeleton-text" style="width: 90px;"></div></td>
            <td><div class="skeleton-text" style="width: 80px;"></div></td>
            <td><div class="skeleton-text" style="width: 60px;"></div></td>
            <td><div class="skeleton-text" style="width: 100px;"></div></td>
            <td><div class="skeleton-text" style="width: 100px;"></div></td>
            <td><div class="skeleton-text" style="width: 60px;"></div></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    class CryptoTerminal {
      constructor() {
        this.coins = [];
        this.filteredCoins = [];
        this.sortKey = 'rank';
        this.sortDir = 1;
        this.priceHistory = new Map();
        this.refreshInterval = 30000;
        this.init();
      }

      async init() {
        await this.fetchCoins();
        this.setupEventListeners();
        this.renderTable();
        setInterval(() => this.fetchCoins(), this.refreshInterval);
      }

      async fetchCoins() {
        try {
          const response = await fetch(
            'https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=15&sparkline=true&price_change_percentage=24h',
            { 'headers': { 'accept': 'application/json' } }
          );

          if (!response.ok) throw new Error('Failed to fetch');

          const data = await response.json();
          this.updateCoins(data);
          this.updateStatus('Live');
        } catch (error) {
          console.error('Fetch error:', error);
          this.updateStatus('Offline');
        }
      }

      updateCoins(data) {
        data.forEach((coin, idx) => {
          const oldCoin = this.coins.find(c => c.id === coin.id);
          const oldPrice = oldCoin?.current_price || coin.current_price;

          coin.rank = idx + 1;
          coin.priceChanged = Math.abs(oldPrice - coin.current_price) > 0.01;
          coin.priceGain = coin.current_price >= oldPrice;

          this.priceHistory.set(coin.id, coin.sparkline.price || []);
        });

        this.coins = data;
        this.applySearch();
      }

      setupEventListeners() {
        document.querySelectorAll('th[data-sort]').forEach(th => {
          th.addEventListener('click', () => this.sort(th.dataset.sort));
        });

        document.getElementById('searchInput').addEventListener('input', (e) => {
          this.searchTerm = e.target.value.toLowerCase();
          this.applySearch();
        });
      }

      applySearch() {
        if (!this.searchTerm) {
          this.filteredCoins = [...this.coins];
        } else {
          this.filteredCoins = this.coins.filter(coin =>
            coin.name.toLowerCase().includes(this.searchTerm) ||
            coin.symbol.toLowerCase().includes(this.searchTerm)
          );
        }
        this.sortCurrentData();
        this.renderTable();
      }

      sort(key) {
        this.sortKey = key;
        this.sortDir = this.sortDir === 1 ? -1 : 1;
        this.sortCurrentData();
        this.renderTable();
      }

      sortCurrentData() {
        this.filteredCoins.sort((a, b) => {
          let aVal = a[this.sortKey];
          let bVal = b[this.sortKey];

          if (typeof aVal === 'string') aVal = aVal.toLowerCase();
          if (typeof bVal === 'string') bVal = bVal.toLowerCase();

          if (aVal < bVal) return -1 * this.sortDir;
          if (aVal > bVal) return 1 * this.sortDir;
          return 0;
        });
      }

      renderTable() {
        const tbody = document.getElementById('tableBody');

        if (this.filteredCoins.length === 0) {
          tbody.innerHTML = `
            <tr>
              <td colspan="7" class="empty-state">
                <p>No coins found. Try a different search.</p>
              </td>
            </tr>
          `;
          return;
        }

        tbody.innerHTML = this.filteredCoins.map(coin => {
          const sparkline = this.createSparkline(coin.id);
          const changeClass = coin.price_change_percentage_24h >= 0 ? 'change-gain' : 'change-loss';
          const changeSign = coin.price_change_percentage_24h >= 0 ? '+' : '';
          const pulseClass = coin.priceChanged ? (coin.priceGain ? 'pulse-gain' : 'pulse-loss') : '';

          return `
            <tr>
              <td class="rank">${coin.rank}</td>
              <td class="coin-info">
                <div class="coin-name">${coin.name}</div>
                <div class="coin-symbol">${coin.symbol}</div>
              </td>
              <td class="price ${pulseClass}">
                ${new Intl.NumberFormat('en-US', {
                  style: 'currency',
                  currency: 'USD',
                  minimumFractionDigits: coin.current_price < 1 ? 6 : 2,
                  maximumFractionDigits: coin.current_price < 1 ? 6 : 2
                }).format(coin.current_price)}
              </td>
              <td class="change-24h ${changeClass}">
                ${changeSign}${coin.price_change_percentage_24h.toFixed(2)}%
              </td>
              <td class="market-cap">
                ${coin.market_cap ? '$' + (coin.market_cap / 1e9).toFixed(1) + 'B' : 'N/A'}
              </td>
              <td class="volume">
                ${coin.total_volume ? '$' + (coin.total_volume / 1e9).toFixed(2) + 'B' : 'N/A'}
              </td>
              <td class="sparkline-cell">${sparkline}</td>
            </tr>
          `;
        }).join('');
      }

      createSparkline(coinId) {
        const prices = this.priceHistory.get(coinId) || [];
        if (prices.length === 0) return '<div class="skeleton-text" style="width: 60px; height: 20px;"></div>';

        const min = Math.min(...prices);
        const max = Math.max(...prices);
        const range = max - min || 1;
        const w = 80;
        const h = 32;
        const points = prices.map((p, i) => {
          const x = (i / (prices.length - 1)) * (w - 2);
          const y = h - ((p - min) / range) * (h - 4) - 2;
          return `${x},${y}`;
        }).join(' ');

        const isGain = prices[prices.length - 1] >= prices[0];
        const color = isGain ? 'oklch(68% 0.18 142)' : 'oklch(62% 0.16 25)';

        return `<svg class="sparkline-chart" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
          <polyline points="${points}" fill="none" stroke="${color}" stroke-width="1.5" vector-effect="non-scaling-stroke" />
        </svg>`;
      }

      updateStatus(text) {
        document.getElementById('statusText').textContent = text;
      }
    }

    new CryptoTerminal();
  </script>
</body>
</html>
