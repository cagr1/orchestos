<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto Terminal – Live Market Data</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      color-scheme: dark light;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: oklch(12% 0 0);
      color: oklch(92% 0.02 280);
      font-size: 14px;
      line-height: 1.5;
      padding: 16px;
      min-height: 100vh;
    }

    @media (min-width: 768px) {
      body {
        padding: 24px 32px;
      }
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 12px;
      color: oklch(65% 0.02 280);
      font-variant-numeric: lining-nums;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: oklch(18% 0.01 0);
      border: 1px solid oklch(30% 0.01 0);
      border-radius: 8px;
      padding: 8px 12px;
      width: 280px;
      transition: border-color 0.2s ease-out;
    }

    @media (max-width: 640px) {
      .search-box {
        width: 100%;
        order: 3;
      }
    }

    .search-box input {
      background: none;
      border: none;
      color: oklch(92% 0.02 280);
      flex: 1;
      font-size: 14px;
      outline: none;
    }

    .search-box input::placeholder {
      color: oklch(50% 0.02 280);
    }

    .search-box:focus-within {
      border-color: oklch(65% 0.25 120);
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: oklch(65% 0.02 280);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: oklch(65% 0.25 120);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Table Container */
    .table-container {
      background: oklch(15% 0.01 0);
      border: 1px solid oklch(25% 0.01 0);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-variant-numeric: tabular-nums;
    }

    thead {
      background: oklch(18% 0.01 0);
      border-bottom: 1px solid oklch(28% 0.01 0);
    }

    th {
      padding: 12px 16px;
      text-align: left;
      font-weight: 600;
      font-size: 12px;
      color: oklch(70% 0.02 280);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      user-select: none;
      transition: color 0.2s ease-out;
    }

    th:hover {
      color: oklch(92% 0.02 280);
    }

    th.sortable::after {
      content: '∼';
      margin-left: 6px;
      opacity: 0.4;
      font-size: 11px;
    }

    th.sort-asc::after {
      content: '↑';
      opacity: 1;
      color: oklch(65% 0.25 120);
    }

    th.sort-desc::after {
      content: '↓';
      opacity: 1;
      color: oklch(65% 0.25 120);
    }

    tbody tr {
      border-bottom: 1px solid oklch(20% 0.01 0);
      transition: background-color 0.15s ease-out;
    }

    tbody tr:hover {
      background: oklch(20% 0.01 0);
    }

    td {
      padding: 14px 16px;
      vertical-align: middle;
      color: oklch(92% 0.02 280);
    }

    /* Coin cell */
    .coin-cell {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 500;
    }

    .coin-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: oklch(25% 0.02 0);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      flex-shrink: 0;
    }

    .coin-name {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .coin-title {
      font-weight: 600;
      color: oklch(92% 0.02 280);
    }

    .coin-symbol {
      font-size: 11px;
      color: oklch(60% 0.02 280);
      text-transform: uppercase;
      font-weight: 500;
    }

    /* Price cells */
    .price {
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .change {
      padding: 4px 8px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 13px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .change.gain {
      background: oklch(35% 0.08 120);
      color: oklch(70% 0.25 120);
    }

    .change.loss {
      background: oklch(35% 0.08 10);
      color: oklch(70% 0.25 10);
    }

    /* Pulse animation for value changes */
    @keyframes cell-pulse {
      0% { background-color: transparent; }
      50% { background-color: oklch(30% 0.15 120); }
      100% { background-color: transparent; }
    }

    td.pulse {
      animation: cell-pulse 0.6s ease-out;
    }

    /* Sparkline */
    .sparkline {
      display: inline-flex;
      align-items: flex-end;
      gap: 2px;
      height: 32px;
    }

    .sparkline svg {
      width: 100%;
      height: 100%;
    }

    /* Skeleton loading */
    @keyframes skeleton-shimmer {
      0% { opacity: 0.5; }
      50% { opacity: 1; }
      100% { opacity: 0.5; }
    }

    .skeleton {
      background: oklch(22% 0.01 0);
      border-radius: 6px;
      animation: skeleton-shimmer 1.5s ease-in-out infinite;
    }

    .skeleton-text {
      height: 14px;
      width: 80%;
    }

    .skeleton-price {
      height: 20px;
      width: 100%;
    }

    .skeleton-chart {
      height: 32px;
      width: 100%;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: oklch(60% 0.02 280);
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    /* Error state */
    .error-banner {
      background: oklch(35% 0.08 10);
      border: 1px solid oklch(60% 0.25 10);
      color: oklch(85% 0.25 10);
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 13px;
    }

    /* Mobile responsive */
    @media (max-width: 768px) {
      .table-container {
        border-radius: 8px;
      }

      table {
        font-size: 13px;
      }

      th, td {
        padding: 10px 12px;
      }

      .coin-cell {
        gap: 8px;
      }

      .coin-icon {
        width: 28px;
        height: 28px;
        font-size: 12px;
      }

      .coin-title {
        font-size: 13px;
      }

      .coin-symbol {
        font-size: 10px;
      }

      /* Hide less important columns on mobile */
      .hide-mobile {
        display: none;
      }

      .sparkline {
        height: 24px;
      }
    }

    /* Accessibility */
    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    @media (prefers-color-scheme: light) {
      body {
        background: oklch(98% 0.01 0);
        color: oklch(20% 0.02 280);
      }

      .header {
        color: oklch(15% 0.02 280);
      }

      .subtitle {
        color: oklch(50% 0.02 280);
      }

      .search-box {
        background: oklch(95% 0.01 0);
        border-color: oklch(80% 0.01 0);
      }

      .search-box input {
        color: oklch(20% 0.02 280);
      }

      .search-box input::placeholder {
        color: oklch(60% 0.02 280);
      }

      .search-box:focus-within {
        border-color: oklch(65% 0.25 120);
      }

      .table-container {
        background: oklch(100% 0 0);
        border-color: oklch(85% 0.01 0);
      }

      thead {
        background: oklch(97% 0.01 0);
        border-bottom-color: oklch(85% 0.01 0);
      }

      th {
        color: oklch(40% 0.02 280);
      }

      th:hover {
        color: oklch(20% 0.02 280);
      }

      tbody tr {
        border-bottom-color: oklch(90% 0.01 0);
      }

      tbody tr:hover {
        background: oklch(96% 0.01 0);
      }

      td {
        color: oklch(20% 0.02 280);
      }

      .coin-icon {
        background: oklch(90% 0.02 0);
      }

      .coin-symbol {
        color: oklch(50% 0.02 280);
      }

      .change.gain {
        background: oklch(90% 0.08 120);
        color: oklch(35% 0.25 120);
      }

      .change.loss {
        background: oklch(90% 0.08 10);
        color: oklch(35% 0.25 10);
      }

      .skeleton {
        background: oklch(92% 0.01 0);
      }

      .empty-state {
        color: oklch(55% 0.02 280);
      }

      .status {
        color: oklch(55% 0.02 280);
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="logo">₿ Crypto Terminal</div>
      <div class="subtitle">Live market data • Updated every 30s</div>
    </div>
    <div class="search-box">
      <input
        type="text"
        id="search"
        placeholder="Search by name or symbol…"
        aria-label="Search coins"
      >
    </div>
    <div class="status">
      <div class="status-dot"></div>
      <span id="last-update">Loading…</span>
    </div>
  </div>

  <div id="error" class="error-banner" style="display: none;"></div>

  <div class="table-container">
    <table id="crypto-table">
      <thead>
        <tr>
          <th class="sortable" data-sort="name">Coin</th>
          <th class="sortable" data-sort="current_price">Price</th>
          <th class="sortable" data-sort="price_change_percentage_24h">24h</th>
          <th class="sortable" data-sort="price_change_percentage_7d" class="hide-mobile">7d</th>
          <th class="sortable" data-sort="market_cap" class="hide-mobile">Market Cap</th>
          <th class="sortable" data-sort="total_volume" class="hide-mobile">Volume</th>
          <th class="hide-mobile">Chart (7d)</th>
        </tr>
      </thead>
      <tbody id="crypto-body">
        <!-- Skeleton loading state -->
        <tr>
          <td><div class="skeleton skeleton-text" style="width: 120px;"></div></td>
          <td><div class="skeleton skeleton-price"></div></td>
          <td><div class="skeleton skeleton-text" style="width: 60px;"></div></td>
          <td class="hide-mobile"><div class="skeleton skeleton-text" style="width: 60px;"></div></td>
          <td class="hide-mobile"><div class="skeleton skeleton-text"></div></td>
          <td class="hide-mobile"><div class="skeleton skeleton-text"></div></td>
          <td class="hide-mobile"><div class="skeleton skeleton-chart"></div></td>
        </tr>
        <tr>
          <td><div class="skeleton skeleton-text" style="width: 120px;"></div></td>
          <td><div class="skeleton skeleton-price"></div></td>
          <td><div class="skeleton skeleton-text" style="width: 60px;"></div></td>
          <td class="hide-mobile"><div class="skeleton skeleton-text" style="width: 60px;"></div></td>
          <td class="hide-mobile"><div class="skeleton skeleton-text"></div></td>
          <td class="hide-mobile"><div class="skeleton skeleton-text"></div></td>
          <td class="hide-mobile"><div class="skeleton skeleton-chart"></div></td>
        </tr>
        <tr>
          <td><div class="skeleton skeleton-text" style="width: 120px;"></div></td>
          <td><div class="skeleton skeleton-price"></div></td>
          <td><div class="skeleton skeleton-text" style="width: 60px;"></div></td>
          <td class="hide-mobile"><div class="skeleton skeleton-text" style="width: 60px;"></div></td>
          <td class="hide-mobile"><div class="skeleton skeleton-text"></div></td>
          <td class="hide-mobile"><div class="skeleton skeleton-text"></div></td>
          <td class="hide-mobile"><div class="skeleton skeleton-chart"></div></td>
        </tr>
      </tbody>
    </table>
  </div>

  <script>
    const state = {
      coins: [],
      filteredCoins: [],
      sortKey: null,
      sortDirection: 'asc',
      previousPrices: new Map(),
      lastUpdate: null,
    };

    const DOM = {
      searchInput: document.getElementById('search'),
      cryptoBody: document.getElementById('crypto-body'),
      table: document.getElementById('crypto-table'),
      lastUpdate: document.getElementById('last-update'),
      errorBanner: document.getElementById('error'),
      headers: document.querySelectorAll('th[data-sort]'),
    };

    // Format utilities
    function formatPrice(price) {
      if (price >= 1) return new Intl.NumberFormat('en-US', {
        style: 'currency',
        currency: 'USD',
        minimumFractionDigits: 2,
        maximumFractionDigits: price < 10 ? 4 : 2,
      }).format(price);
      return '$' + price.toExponential(2);
    }

    function formatMarketCap(cap) {
      if (!cap) return 'N/A';
      if (cap >= 1e12) return '$' + (cap / 1e12).toFixed(2) + 'T';
      if (cap >= 1e9) return '$' + (cap / 1e9).toFixed(2) + 'B';
      if (cap >= 1e6) return '$' + (cap / 1e6).toFixed(2) + 'M';
      return '$' + cap.toFixed(0);
    }

    function formatPercent(value) {
      if (value === null || value === undefined) return 'N/A';
      return (value >= 0 ? '+' : '') + value.toFixed(2) + '%';
    }

    // Sparkline SVG generator
    function generateSparkline(prices) {
      if (!prices || prices.length < 2) return '';

      const min = Math.min(...prices);
      const max = Math.max(...prices);
      const range = max - min || 1;

      const height = 32;
      const width = prices.length * 3;
      const points = prices
        .map((price, i) => {
          const y = height - ((price - min) / range) * (height - 4) - 2;
          return `${i * 3},${y}`;
        })
        .join(' ');

      const color = prices[prices.length - 1] >= prices[0]
        ? 'oklch(70% 0.25 120)'
        : 'oklch(70% 0.25 10)';

      return `<svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">
        <polyline points="${points}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>`;
    }

    // API call
    async function fetchCoins() {
      try {
        DOM.errorBanner.style.display = 'none';
        const params = new URLSearchParams({
          vs_currency: 'usd',
          order: 'market_cap_desc',
          per_page: 15,
          page: 1,
          sparkline: true,
          price_change_percentage: '24h,7d',
        });

        const response = await fetch(
          `https://api.coingecko.com/api/v3/coins/markets?${params}`,
          { headers: { 'Accept-Encoding': 'gzip' } }
        );

        if (!response.ok) throw new Error(`API error: ${response.status}`);

        const data = await response.json();
        state.coins = data;
        state.lastUpdate = new Date();
        applyFiltersAndSort();
        renderTable();
      } catch (error) {
        console.error('Fetch error:', error);
        DOM.errorBanner.textContent = `⚠ Failed to load data: ${error.message}`;
        DOM.errorBanner.style.display = 'block';
      }
    }

    function applyFiltersAndSort() {
      let filtered = [...state.coins];

      // Filter by search
      const query = DOM.searchInput.value.toLowerCase();
      if (query) {
        filtered = filtered.filter(coin =>
          coin.name.toLowerCase().includes(query) ||
          coin.symbol.toLowerCase().includes(query)
        );
      }

      // Sort
      if (state.sortKey) {
        filtered.sort((a, b) => {
          let aVal = a[state.sortKey];
          let bVal = b[state.sortKey];

          if (aVal === null) aVal = -Infinity;
          if (bVal === null) bVal = -Infinity;

          const cmp = typeof aVal === 'string'
            ? aVal.localeCompare(bVal)
            : aVal - bVal;

          return state.sortDirection === 'asc' ? cmp : -cmp;
        });
      }

      state.filteredCoins = filtered;
    }

    function renderTable() {
      if (!state.filteredCoins.length) {
        DOM.cryptoBody.innerHTML = `
          <tr>
            <td colspan="7" style="text-align: center; padding: 48px 24px;">
              <div class="empty-state">
                <div class="empty-state-icon">🔍</div>
                <div>No coins found matching your search</div>
              </div>
            </td>
          </tr>
        `;
        return;
      }

      DOM.cryptoBody.innerHTML = state.filteredCoins.map(coin => {
        const sparklineHtml = coin.sparkline_in_7d?.price
          ? generateSparkline(coin.sparkline_in_7d.price)
          : '';

        const change24h = coin.price_change_percentage_24h || 0;
        const change7d = coin.price_change_percentage_7d || 0;
        const isGain24h = change24h >= 0;
        const isGain7d = change7d >= 0;

        return `
          <tr data-coin-id="${coin.id}">
            <td>
              <div class="coin-cell">
                <div class="coin-icon">${coin.symbol.charAt(0).toUpperCase()}</div>
                <div class="coin-name">
                  <div class="coin-title">${coin.name}</div>
                  <div class="coin-symbol">${coin.symbol.toUpperCase()}</div>
                </div>
              </div>
            </td>
            <td class="price" data-field="current_price">${formatPrice(coin.current_price)}</td>
            <td>
              <div class="change ${isGain24h ? 'gain' : 'loss'}">
                ${isGain24h ? '▲' : '▼'} ${formatPercent(change24h)}
              </div>
            </td>
            <td class="hide-mobile">
              <div class="change ${isGain7d ? 'gain' : 'loss'}">
                ${isGain7d ? '▲' : '▼'} ${formatPercent(change7d)}
              </div>
            </td>
            <td class="hide-mobile">${formatMarketCap(coin.market_cap)}</td>
            <td class="hide-mobile">${formatMarketCap(coin.total_volume)}</td>
            <td class="hide-mobile">
              <div class="sparkline">${sparklineHtml}</div>
            </td>
          </tr>
        `;
      }).join('');

      // Add pulse animation to changed prices
      if (state.previousPrices.size > 0) {
        requestAnimationFrame(() => {
          state.filteredCoins.forEach(coin => {
            const row = DOM.cryptoBody.querySelector(`tr[data-coin-id="${coin.id}"]`);
            if (row) {
              const priceCell = row.querySelector('[data-field="current_price"]');
              if (state.previousPrices.has(coin.id) &&
                  state.previousPrices.get(coin.id) !== coin.current_price) {
                priceCell.classList.add('pulse');
                setTimeout(() => priceCell.classList.remove('pulse'), 600);
              }
            }
          });
        });
      }

      // Update previous prices
      state.coins.forEach(coin => {
        state.previousPrices.set(coin.id, coin.current_price);
      });

      updateLastUpdate();
    }

    function updateLastUpdate() {
      if (state.lastUpdate) {
        const now = new Date();
        const elapsed = Math.round((now - state.lastUpdate) / 1000);
        DOM.lastUpdate.textContent = elapsed < 30
          ? `Updated now`
          : `Updated ${elapsed}s ago`;
      }
    }

    // Event listeners
    DOM.searchInput.addEventListener('input', () => {
      applyFiltersAndSort();
      renderTable();
    });

    DOM.headers.forEach(header => {
      header.addEventListener('click', () => {
        const sortKey = header.dataset.sort;

        // Update sort state
        if (state.sortKey === sortKey) {
          state.sortDirection = state.sortDirection === 'asc' ? 'desc' : 'asc';
        } else {
          state.sortKey = sortKey;
          state.sortDirection = 'asc';
        }

        // Update header classes
        DOM.headers.forEach(h => {
          h.classList.remove('sort-asc', 'sort-desc');
        });
        header.classList.add(
          state.sortDirection === 'asc' ? 'sort-asc' : 'sort-desc'
        );

        applyFiltersAndSort();
        renderTable();
      });
    });

    // Auto-refresh every 30 seconds
    setInterval(() => {
      fetchCoins();
    }, 30000);

    // Update elapsed time display
    setInterval(() => {
      updateLastUpdate();
    }, 1000);

    // Initial load
    fetchCoins();
  </script>
</body>
</html>
