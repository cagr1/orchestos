<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto Terminal – Live Market Data</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      color-scheme: dark;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1421;
      color: #ffffff;
      font-size: 14px;
      line-height: 1.5;
      padding: 24px;
      min-height: 100vh;
    }

    @media (max-width: 768px) {
      body {
        padding: 16px;
      }
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: #ffffff;
    }

    .subtitle {
      font-size: 12px;
      color: #8c8ea3;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    /* Search */
    .search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #222531;
      border: 1px solid #3a3d47;
      border-radius: 8px;
      padding: 10px 14px;
      width: 280px;
      transition: all 0.2s ease-out;
    }

    @media (max-width: 768px) {
      .search-box {
        width: 100%;
        order: 3;
      }
    }

    .search-box:focus-within {
      border-color: #3861fb;
      background: #282c37;
    }

    .search-box input {
      background: none;
      border: none;
      color: #ffffff;
      flex: 1;
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }

    .search-box input::placeholder {
      color: #8c8ea3;
    }

    /* Status */
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #8c8ea3;
      font-weight: 500;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #16c784;
      animation: status-pulse 2s ease-in-out infinite;
    }

    @keyframes status-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Table Container */
    .table-container {
      background: #222531;
      border: 1px solid #3a3d47;
      border-radius: 12px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-variant-numeric: tabular-nums;
    }

    thead {
      background: #1a1d26;
      border-bottom: 1px solid #3a3d47;
    }

    th {
      padding: 14px 16px;
      text-align: left;
      font-weight: 600;
      font-size: 11px;
      color: #8c8ea3;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
      user-select: none;
      transition: color 0.2s ease-out;
    }

    th:hover {
      color: #ffffff;
    }

    th.sortable {
      cursor: pointer;
    }

    th.sortable::after {
      content: '⁓';
      margin-left: 6px;
      opacity: 0.4;
      font-size: 10px;
    }

    th.sort-asc::after {
      content: '↑';
      opacity: 1;
      color: #3861fb;
    }

    th.sort-desc::after {
      content: '↓';
      opacity: 1;
      color: #3861fb;
    }

    tbody tr {
      border-bottom: 1px solid #2c2f38;
      transition: background-color 0.15s ease-out;
    }

    tbody tr:hover {
      background: #2c2f38;
    }

    td {
      padding: 14px 16px;
      vertical-align: middle;
      color: #ffffff;
    }

    /* Coin Cell */
    .coin-cell {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 500;
    }

    .coin-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #3a3d47;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      flex-shrink: 0;
      color: #8c8ea3;
    }

    .coin-name {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .coin-title {
      font-weight: 600;
      color: #ffffff;
      font-size: 14px;
    }

    .coin-symbol {
      font-size: 11px;
      color: #8c8ea3;
      text-transform: uppercase;
      font-weight: 500;
      letter-spacing: 0.04em;
    }

    /* Price */
    .price {
      font-weight: 600;
      font-size: 14px;
      letter-spacing: -0.01em;
    }

    /* Change Badge */
    .change {
      padding: 4px 8px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 12px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-variant-numeric: tabular-nums;
    }

    .change.gain {
      background: rgba(22, 199, 132, 0.1);
      color: #16c784;
    }

    .change.loss {
      background: rgba(234, 57, 67, 0.1);
      color: #ea3943;
    }

    /* Price pulse on change */
    @keyframes cell-pulse {
      0%, 100% { background-color: transparent; }
      50% { background-color: rgba(56, 97, 251, 0.15); }
    }

    td.pulse {
      animation: cell-pulse 0.8s ease-out;
    }

    /* Sparkline */
    .sparkline {
      display: inline-flex;
      align-items: flex-end;
      gap: 1px;
      height: 32px;
      width: 100%;
    }

    .sparkline svg {
      width: 100%;
      height: 100%;
    }

    /* Skeleton Loading – Flat Opacity Pulse */
    @keyframes skeleton-pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.7; }
    }

    .skeleton {
      background: #3a3d47;
      border-radius: 4px;
      animation: skeleton-pulse 1.2s ease-in-out infinite;
    }

    .skeleton-text {
      height: 14px;
      width: 80%;
    }

    .skeleton-price {
      height: 18px;
      width: 100%;
    }

    .skeleton-chart {
      height: 32px;
      width: 100%;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 24px;
      color: #8c8ea3;
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.6;
    }

    .empty-state-text {
      font-size: 14px;
      font-weight: 500;
    }

    /* Error Banner */
    .error-banner {
      background: rgba(234, 57, 67, 0.1);
      border: 1px solid rgba(234, 57, 67, 0.3);
      color: #ea3943;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 13px;
      font-weight: 500;
      display: none;
    }

    /* Mobile Responsive */
    @media (max-width: 768px) {
      .table-container {
        border-radius: 8px;
      }

      table {
        font-size: 13px;
      }

      th, td {
        padding: 12px 12px;
      }

      .coin-cell {
        gap: 8px;
      }

      .coin-icon {
        width: 28px;
        height: 28px;
        font-size: 12px;
      }

      .coin-title {
        font-size: 13px;
      }

      .coin-symbol {
        font-size: 10px;
      }

      .hide-mobile {
        display: none;
      }

      .sparkline {
        height: 24px;
      }

      .header {
        flex-direction: column;
        align-items: stretch;
        gap: 16px;
      }

      .header-left {
        flex-direction: column;
        gap: 8px;
      }

      .status {
        justify-content: flex-start;
      }
    }

    /* Accessibility */
    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* Focus states */
    th:focus-visible,
    a:focus-visible {
      outline: 2px solid #3861fb;
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="logo">₿ Crypto Terminal</div>
      <div class="subtitle">Live market data • Updated every 30s</div>
    </div>
    <div class="search-box">
      <input
        type="text"
        id="search"
        placeholder="Search by name or symbol…"
        aria-label="Search coins"
      >
    </div>
    <div class="status">
      <div class="status-dot"></div>
      <span id="last-update">Loading…</span>
    </div>
  </div>

  <div id="error" class="error-banner"></div>

  <div class="table-container">
    <table id="crypto-table">
      <thead>
        <tr>
          <th class="sortable" data-sort="name">Coin</th>
          <th class="sortable" data-sort="current_price">Price</th>
          <th class="sortable" data-sort="price_change_percentage_24h">24h</th>
          <th class="sortable" data-sort="price_change_percentage_7d" class="hide-mobile">7d</th>
          <th class="sortable" data-sort="market_cap" class="hide-mobile">Market Cap</th>
          <th class="sortable" data-sort="total_volume" class="hide-mobile">Volume</th>
          <th class="hide-mobile">Chart (7d)</th>
        </tr>
      </thead>
      <tbody id="crypto-body">
        <!-- Skeleton loading state -->
        <tr>
          <td><div class="skeleton skeleton-text" style="width: 120px;"></div></td>
          <td><div class="skeleton skeleton-price"></div></td>
          <td><div class="skeleton skeleton-text" style="width: 60px;"></div></td>
          <td class="hide-mobile"><div class="skeleton skeleton-text" style="width: 60px;"></div></td>
          <td class="hide-mobile"><div class="skeleton skeleton-text"></div></td>
          <td class="hide-mobile"><div class="skeleton skeleton-text"></div></td>
          <td class="hide-mobile"><div class="skeleton skeleton-chart"></div></td>
        </tr>
        <tr>
          <td><div class="skeleton skeleton-text" style="width: 120px;"></div></td>
          <td><div class="skeleton skeleton-price"></div></td>
          <td><div class="skeleton skeleton-text" style="width: 60px;"></div></td>
          <td class="hide-mobile"><div class="skeleton skeleton-text" style="width: 60px;"></div></td>
          <td class="hide-mobile"><div class="skeleton skeleton-text"></div></td>
          <td class="hide-mobile"><div class="skeleton skeleton-text"></div></td>
          <td class="hide-mobile"><div class="skeleton skeleton-chart"></div></td>
        </tr>
        <tr>
          <td><div class="skeleton skeleton-text" style="width: 120px;"></div></td>
          <td><div class="skeleton skeleton-price"></div></td>
          <td><div class="skeleton skeleton-text" style="width: 60px;"></div></td>
          <td class="hide-mobile"><div class="skeleton skeleton-text" style="width: 60px;"></div></td>
          <td class="hide-mobile"><div class="skeleton skeleton-text"></div></td>
          <td class="hide-mobile"><div class="skeleton skeleton-text"></div></td>
          <td class="hide-mobile"><div class="skeleton skeleton-chart"></div></td>
        </tr>
      </tbody>
    </table>
  </div>

  <script>
    const state = {
      coins: [],
      filteredCoins: [],
      sortKey: null,
      sortDirection: 'asc',
      previousPrices: new Map(),
      lastUpdate: null,
    };

    const DOM = {
      searchInput: document.getElementById('search'),
      cryptoBody: document.getElementById('crypto-body'),
      table: document.getElementById('crypto-table'),
      lastUpdate: document.getElementById('last-update'),
      errorBanner: document.getElementById('error'),
      headers: document.querySelectorAll('th[data-sort]'),
    };

    // Format utilities
    function formatPrice(price) {
      if (price >= 1) return new Intl.NumberFormat('en-US', {
        style: 'currency',
        currency: 'USD',
        minimumFractionDigits: 2,
        maximumFractionDigits: price < 10 ? 4 : 2,
      }).format(price);
      return '$' + price.toExponential(2);
    }

    function formatMarketCap(cap) {
      if (!cap) return 'N/A';
      if (cap >= 1e12) return '$' + (cap / 1e12).toFixed(2) + 'T';
      if (cap >= 1e9) return '$' + (cap / 1e9).toFixed(2) + 'B';
      if (cap >= 1e6) return '$' + (cap / 1e6).toFixed(2) + 'M';
      return '$' + cap.toFixed(0);
    }

    function formatPercent(value) {
      if (value === null || value === undefined) return 'N/A';
      return (value >= 0 ? '+' : '') + value.toFixed(2) + '%';
    }

    // Sparkline SVG generator
    function generateSparkline(prices) {
      if (!prices || prices.length < 2) return '';

      const min = Math.min(...prices);
      const max = Math.max(...prices);
      const range = max - min || 1;

      const height = 32;
      const width = prices.length * 3;
      const points = prices
        .map((price, i) => {
          const y = height - ((price - min) / range) * (height - 4) - 2;
          return `${i * 3},${y}`;
        })
        .join(' ');

      const color = prices[prices.length - 1] >= prices[0] ? '#16c784' : '#ea3943';

      return `<svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">
        <polyline points="${points}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>`;
    }

    // API call
    async function fetchCoins() {
      try {
        DOM.errorBanner.style.display = 'none';
        const params = new URLSearchParams({
          vs_currency: 'usd',
          order: 'market_cap_desc',
          per_page: 15,
          page: 1,
          sparkline: true,
          price_change_percentage: '24h,7d',
        });

        const response = await fetch(
          `https://api.coingecko.com/api/v3/coins/markets?${params}`,
          { headers: { 'Accept-Encoding': 'gzip' } }
        );

        if (!response.ok) throw new Error(`API error: ${response.status}`);

        const data = await response.json();
        state.coins = data;
        state.lastUpdate = new Date();
        applyFiltersAndSort();
        renderTable();
      } catch (error) {
        console.error('Fetch error:', error);
        DOM.errorBanner.textContent = `⚠ Failed to load data: ${error.message}`;
        DOM.errorBanner.style.display = 'block';
      }
    }

    function applyFiltersAndSort() {
      let filtered = [...state.coins];

      // Filter by search
      const query = DOM.searchInput.value.toLowerCase();
      if (query) {
        filtered = filtered.filter(coin =>
          coin.name.toLowerCase().includes(query) ||
          coin.symbol.toLowerCase().includes(query)
        );
      }

      // Sort
      if (state.sortKey) {
        filtered.sort((a, b) => {
          let aVal = a[state.sortKey];
          let bVal = b[state.sortKey];

          if (aVal === null) aVal = -Infinity;
          if (bVal === null) bVal = -Infinity;

          const cmp = typeof aVal === 'string'
            ? aVal.localeCompare(bVal)
            : aVal - bVal;

          return state.sortDirection === 'asc' ? cmp : -cmp;
        });
      }

      state.filteredCoins = filtered;
    }

    function renderTable() {
      if (!state.filteredCoins.length) {
        DOM.cryptoBody.innerHTML = `
          <tr>
            <td colspan="7" style="text-align: center; padding: 60px 24px;">
              <div class="empty-state">
                <div class="empty-state-icon">🔍</div>
                <div class="empty-state-text">No coins found matching your search</div>
              </div>
            </td>
          </tr>
        `;
        return;
      }

      DOM.cryptoBody.innerHTML = state.filteredCoins.map(coin => {
        const sparklineHtml = coin.sparkline_in_7d?.price
          ? generateSparkline(coin.sparkline_in_7d.price)
          : '';

        const change24h = coin.price_change_percentage_24h || 0;
        const change7d = coin.price_change_percentage_7d || 0;
        const isGain24h = change24h >= 0;
        const isGain7d = change7d >= 0;

        return `
          <tr data-coin-id="${coin.id}">
            <td>
              <div class="coin-cell">
                <div class="coin-icon">${coin.symbol.charAt(0).toUpperCase()}</div>
                <div class="coin-name">
                  <div class="coin-title">${coin.name}</div>
                  <div class="coin-symbol">${coin.symbol.toUpperCase()}</div>
                </div>
              </div>
            </td>
            <td class="price" data-field="current_price">${formatPrice(coin.current_price)}</td>
            <td>
              <div class="change ${isGain24h ? 'gain' : 'loss'}">
                ${isGain24h ? '▲' : '▼'} ${formatPercent(change24h)}
              </div>
            </td>
            <td class="hide-mobile">
              <div class="change ${isGain7d ? 'gain' : 'loss'}">
                ${isGain7d ? '▲' : '▼'} ${formatPercent(change7d)}
              </div>
            </td>
            <td class="hide-mobile">${formatMarketCap(coin.market_cap)}</td>
            <td class="hide-mobile">${formatMarketCap(coin.total_volume)}</td>
            <td class="hide-mobile">
              <div class="sparkline">${sparklineHtml}</div>
            </td>
          </tr>
        `;
      }).join('');

      // Add pulse animation to changed prices
      if (state.previousPrices.size > 0) {
        requestAnimationFrame(() => {
          state.filteredCoins.forEach(coin => {
            const row = DOM.cryptoBody.querySelector(`tr[data-coin-id="${coin.id}"]`);
            if (row) {
              const priceCell = row.querySelector('[data-field="current_price"]');
              if (state.previousPrices.has(coin.id) &&
                  state.previousPrices.get(coin.id) !== coin.current_price) {
                priceCell.classList.add('pulse');
                setTimeout(() => priceCell.classList.remove('pulse'), 800);
              }
            }
          });
        });
      }

      // Update previous prices
      state.coins.forEach(coin => {
        state.previousPrices.set(coin.id, coin.current_price);
      });

      updateLastUpdate();
    }

    function updateLastUpdate() {
      if (state.lastUpdate) {
        const now = new Date();
        const elapsed = Math.round((now - state.lastUpdate) / 1000);
        DOM.lastUpdate.textContent = elapsed < 30
          ? `Updated now`
          : `Updated ${elapsed}s ago`;
      }
    }

    // Event listeners
    DOM.searchInput.addEventListener('input', () => {
      applyFiltersAndSort();
      renderTable();
    });

    DOM.headers.forEach(header => {
      header.addEventListener('click', () => {
        const sortKey = header.dataset.sort;

        // Update sort state
        if (state.sortKey === sortKey) {
          state.sortDirection = state.sortDirection === 'asc' ? 'desc' : 'asc';
        } else {
          state.sortKey = sortKey;
          state.sortDirection = 'asc';
        }

        // Update header classes
        DOM.headers.forEach(h => {
          h.classList.remove('sort-asc', 'sort-desc');
        });
        header.classList.add(
          state.sortDirection === 'asc' ? 'sort-asc' : 'sort-desc'
        );

        applyFiltersAndSort();
        renderTable();
      });
    });

    // Auto-refresh every 30 seconds
    setInterval(() => {
      fetchCoins();
    }, 30000);

    // Update elapsed time display
    setInterval(() => {
      updateLastUpdate();
    }, 1000);

    // Initial load
    fetchCoins();
  </script>
</body>
</html>
