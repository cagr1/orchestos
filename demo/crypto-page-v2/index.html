<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Dashboard - Live Markets</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0a0e27;
            color: #e4e4e7;
            height: 100%;
        }

        body {
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        header {
            margin-bottom: 30px;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 20px;
            font-weight: 500;
            letter-spacing: -0.02em;
            color: #ffffff;
        }

        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box {
            position: relative;
            flex: 1;
            min-width: 200px;
            max-width: 300px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 14px;
            background: #1a1a1f;
            border: 1px solid #2d3139;
            border-radius: 3px;
            color: #e4e4e7;
            font-size: 14px;
            transition: all 0.2s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .search-box input::placeholder {
            color: #64748b;
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 3px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            background: #1a1a1f;
            color: #e4e4e7;
            border: 1px solid #2d3139;
        }

        .btn:hover {
            background: #334155;
            border-color: #475569;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            border-color: #3b82f6;
            color: white;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            border-color: #2563eb;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .sort-controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .sort-btn {
            padding: 8px 12px;
            background: #1a1a1f;
            border: 1px solid #2d3139;
            border-radius: 3px;
            color: #a1a5b4;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .sort-btn:hover {
            background: #334155;
            color: #e4e4e7;
        }

        .sort-btn.active {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #64748b;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef4444;
            animation: pulse 2s infinite;
        }

        .status-dot.active {
            background: #10b981;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .cards-grid {
            flex: 1;
            display: flex;
            flex-direction: column;
            border: 1px solid #2d3139;
            border-radius: 3px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        thead {
            background: #0f0f12;
            border-bottom: 1px solid #2d3139;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        th {
            padding: 12px 16px;
            text-align: left;
            font-weight: 500;
            color: #64748b;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.5px;
            border-right: 1px solid #2d3139;
        }

        th:last-child {
            border-right: none;
        }

        tbody tr {
            border-bottom: 1px solid #1a1a1f;
            transition: background 0.15s ease;
            height: 64px;
        }

        tbody tr:hover {
            background: #1a1a1f;
        }

        tbody tr:nth-child(even) {
            background: #0f0f12;
        }

        td {
            padding: 12px 16px;
            vertical-align: middle;
            color: #e4e4e7;
            border-right: 1px solid #2d3139;
        }

        td:last-child {
            border-right: none;
        }

        .coin-cell {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 180px;
        }

        .coin-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #1a1a1f;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .coin-details {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }

        .coin-name {
            font-weight: 500;
            font-size: 13px;
            color: #ffffff;
        }

        .coin-symbol {
            font-size: 11px;
            color: #64748b;
            text-transform: uppercase;
        }

        .price {
            font-family: 'IBM Plex Mono', 'Menlo', 'Monaco', monospace;
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
            font-feature-settings: "tnum";
            min-width: 140px;
            text-align: right;
        }

        .change {
            font-size: 12px;
            font-weight: 500;
            text-align: right;
            min-width: 80px;
        }

        .change.positive {
            color: #00d084;
        }

        .change.negative {
            color: #ff3860;
        }

        .sparkline-cell {
            width: 160px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sparkline-container {
            height: 32px;
            width: 100%;
            display: flex;
            align-items: flex-end;
            gap: 1px;
        }

        .market-cap-cell {
            font-family: 'IBM Plex Mono', 'Menlo', 'Monaco', monospace;
            font-size: 12px;
            font-weight: 500;
            color: #a1a5b4;
            text-align: right;
            min-width: 100px;
            font-feature-settings: "tnum";
        }


        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }

            h1 {
                font-size: 18px;
            }

            .header-content {
                flex-direction: column;
                align-items: stretch;
            }

            .controls {
                flex-direction: column;
            }

            .search-box {
                max-width: 100%;
            }

            .sort-controls {
                justify-content: space-between;
            }

            .sort-btn {
                flex: 1;
                font-size: 12px;
            }

            th, td {
                padding: 10px 8px;
                font-size: 12px;
            }

            .coin-cell {
                gap: 8px;
            }

            .coin-icon {
                width: 32px;
                height: 32px;
            }

            .coin-name {
                font-size: 12px;
            }

            .coin-symbol {
                font-size: 10px;
            }

            .price {
                font-size: 13px;
            }

            .change {
                font-size: 11px;
            }

            .market-cap-cell {
                font-size: 11px;
            }

            .sparkline-cell {
                width: 120px;
                padding: 8px;
            }

            .sparkline-container {
                height: 24px;
            }
        }

        .refresh-btn-spinner {
            display: inline-block;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1a1a1f;
            border: 1px solid #2d3139;
            border-radius: 3px;
            padding: 16px 20px;
            color: #e4e4e7;
            font-size: 14px;
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
        }

        .toast.error {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }

        .toast.success {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.1);
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .market-cap-badge {
            display: inline-block;
            background: rgba(59, 130, 246, 0.15);
            border: 1px solid #3b82f6;
            color: #60a5fa;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1>💎 Crypto Markets</h1>
                <div class="controls">
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="Search coins...">
                    </div>
                    <div class="sort-controls">
                        <button class="sort-btn active" data-sort="market-cap-desc">Market Cap ↓</button>
                        <button class="sort-btn" data-sort="price-high">Price ↑</button>
                        <button class="sort-btn" data-sort="change-positive">Gainers</button>
                        <button class="sort-btn" data-sort="change-negative">Losers</button>
                    </div>
                    <button class="btn btn-primary" id="refreshBtn">⟳ Refresh</button>
                </div>
            </div>
            <div class="status">
                <span class="status-dot active"></span>
                <span id="statusText">Live data · Last update: --:--</span>
            </div>
        </header>

        <div class="cards-grid" id="cardsGrid">
            <table id="coinsTable">
                <thead>
                    <tr>
                        <th>Coin</th>
                        <th style="text-align: right;">Price</th>
                        <th style="text-align: right;">24h Change</th>
                        <th style="text-align: center;">7d Trend</th>
                        <th style="text-align: right;">Market Cap</th>
                    </tr>
                </thead>
                <tbody id="coinsList">
                    <!-- Rows will be generated here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = 'https://api.coingecko.com/api/v3';
        const REFRESH_INTERVAL = 60000; // 60 seconds
        
        let allCoins = [];
        let currentSort = 'market-cap-desc';
        let currentSearch = '';
        let isLoading = false;
        let refreshTimer = null;

        const state = {
            coins: [],
            filteredCoins: [],
            sort: 'market-cap-desc',
            search: '',
        };

        const elements = {
            cardsGrid: document.getElementById('cardsGrid'),
            coinsList: document.getElementById('coinsList'),
            searchInput: document.getElementById('searchInput'),
            refreshBtn: document.getElementById('refreshBtn'),
            statusText: document.getElementById('statusText'),
            sortBtns: document.querySelectorAll('.sort-btn'),
        };

        // Initialize
        function init() {
            fetchCoins();
            setupEventListeners();
            setupAutoRefresh();
        }

        function setupEventListeners() {
            elements.searchInput.addEventListener('input', handleSearch);
            elements.refreshBtn.addEventListener('click', handleRefresh);
            
            elements.sortBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    elements.sortBtns.forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    state.sort = e.target.dataset.sort;
                    renderCards();
                });
            });
        }

        function setupAutoRefresh() {
            refreshTimer = setInterval(() => {
                fetchCoins();
            }, REFRESH_INTERVAL);
        }

        function handleSearch(e) {
            state.search = e.target.value.toLowerCase();
            renderCards();
        }

        function handleRefresh() {
            fetchCoins();
        }

        async function fetchCoins() {
            if (isLoading) return;
            
            isLoading = true;
            elements.refreshBtn.disabled = true;
            elements.refreshBtn.innerHTML = '<span class="refresh-btn-spinner">⟳</span> Refreshing...';

            try {
                const response = await fetch(
                    `${API_URL}/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=10&sparkline=true&price_change_percentage=24h&locale=en`,
                    { 
                        headers: { 'Accept': 'application/json' },
                        cache: 'no-cache'
                    }
                );

                if (!response.ok) throw new Error(`API Error: ${response.status}`);

                const data = await response.json();
                state.coins = data.map(coin => ({
                    id: coin.id,
                    name: coin.name,
                    symbol: coin.symbol.toUpperCase(),
                    image: coin.image,
                    price: coin.current_price,
                    change24h: coin.price_change_percentage_24h || 0,
                    marketCap: coin.market_cap,
                    volume24h: coin.total_volume,
                    sparklineData: coin.sparkline_in_7d?.price || [],
                }));

                allCoins = [...state.coins];
                renderCards();
                updateStatus(true);
                showToast('Data refreshed successfully', 'success');
            } catch (error) {
                console.error('Fetch error:', error);
                updateStatus(false);
                if (allCoins.length === 0) {
                    showError(error.message);
                } else {
                    showToast('Failed to refresh. Showing cached data.', 'error');
                }
            } finally {
                isLoading = false;
                elements.refreshBtn.disabled = false;
                elements.refreshBtn.innerHTML = '⟳ Refresh';
            }
        }

        function filterAndSortCoins() {
            let filtered = state.coins;

            if (state.search) {
                filtered = filtered.filter(coin =>
                    coin.name.toLowerCase().includes(state.search) ||
                    coin.symbol.toLowerCase().includes(state.search)
                );
            }

            // Sort
            switch (state.sort) {
                case 'market-cap-desc':
                    filtered.sort((a, b) => (b.marketCap || 0) - (a.marketCap || 0));
                    break;
                case 'price-high':
                    filtered.sort((a, b) => b.price - a.price);
                    break;
                case 'change-positive':
                    filtered.sort((a, b) => b.change24h - a.change24h);
                    break;
                case 'change-negative':
                    filtered.sort((a, b) => a.change24h - b.change24h);
                    break;
            }

            return filtered;
        }

        function renderCards() {
            const filtered = filterAndSortCoins();

            if (state.coins.length === 0) {
                elements.coinsList.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 40px; color: #64748b;">Loading...</td></tr>';
                return;
            }

            if (filtered.length === 0) {
                elements.coinsList.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 40px; color: #64748b;">🔍 No coins found — try adjusting your search</td></tr>';
                return;
            }

            elements.coinsList.innerHTML = filtered.map(coin => createCoinRow(coin)).join('');
        }

        function createCoinRow(coin) {
            const isPositive = coin.change24h >= 0;
            const sparklineSvg = createSparkline(coin.sparklineData, isPositive);
            const formattedPrice = formatPrice(coin.price);
            const formattedMarketCap = formatLargeNumber(coin.marketCap);

            return `
                <tr>
                    <td>
                        <div class="coin-cell">
                            <div class="coin-icon">
                                <img src="${coin.image}" alt="${coin.name}" style="width: 100%; height: 100%; border-radius: 50%;" onerror="this.style.display='none'">
                            </div>
                            <div class="coin-details">
                                <div class="coin-name">${coin.name}</div>
                                <div class="coin-symbol">${coin.symbol}</div>
                            </div>
                        </div>
                    </td>
                    <td>
                        <div class="price">${formattedPrice}</div>
                    </td>
                    <td>
                        <div class="change ${isPositive ? 'positive' : 'negative'}">
                            ${isPositive ? '↑' : '↓'} ${Math.abs(coin.change24h).toFixed(2)}%
                        </div>
                    </td>
                    <td>
                        <div class="sparkline-cell">
                            <div class="sparkline-container">
                                ${sparklineSvg}
                            </div>
                        </div>
                    </td>
                    <td>
                        <div class="market-cap-cell">${formattedMarketCap}</div>
                    </td>
                </tr>
            `;
        }

        function createSparkline(data, isPositive) {
            if (!data || data.length === 0) {
                return '<svg width="160" height="32" viewBox="0 0 160 32" style="width: 100%; height: 100%;"><rect width="160" height="32" fill="#1a1a1f" rx="2"/></svg>';
            }

            const width = 160;
            const height = 32;
            const padding = 2;
            const availableWidth = width - (padding * 2);
            const availableHeight = height - (padding * 2);

            const min = Math.min(...data);
            const max = Math.max(...data);
            const range = max - min || 1;

            const points = data.map((value, i) => {
                const x = padding + (i / (data.length - 1)) * availableWidth;
                const y = padding + availableHeight - ((value - min) / range) * availableHeight;
                return `${x},${y}`;
            }).join(' ');

            const color = isPositive ? '#00d084' : '#ff3860';
            const gradId = `grad-${Math.random().toString(36).substr(2, 9)}`;

            return `
                <svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" style="width: 100%; height: 100%;">
                    <defs>
                        <linearGradient id="${gradId}" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style="stop-color:${color};stop-opacity:0.25" />
                            <stop offset="100%" style="stop-color:${color};stop-opacity:0" />
                        </linearGradient>
                    </defs>
                    <polyline points="${points}" fill="none" stroke="${color}" stroke-width="1.2" vector-effect="non-scaling-stroke"/>
                    <polyline points="${points} ${width - padding},${height} ${padding},${height}" fill="url(#${gradId})" stroke="none"/>
                </svg>
            `;
        }

        function formatPrice(price) {
            if (price >= 1) {
                return '$' + price.toFixed(2);
            } else if (price > 0) {
                return '$' + price.toFixed(6);
            }
            return '$0';
        }

        function formatLargeNumber(num) {
            if (!num) return '-';
            if (num >= 1e9) return '$' + (num / 1e9).toFixed(1) + 'B';
            if (num >= 1e6) return '$' + (num / 1e6).toFixed(1) + 'M';
            if (num >= 1e3) return '$' + (num / 1e3).toFixed(1) + 'K';
            return '$' + num.toFixed(0);
        }

        function updateStatus(isOnline) {
            const now = new Date();
            const time = now.toLocaleTimeString('en-US', { 
                hour: '2-digit', 
                minute: '2-digit',
                second: '2-digit'
            });
            const statusDot = document.querySelector('.status-dot');
            const statusText = document.getElementById('statusText');
            
            if (isOnline) {
                statusDot.classList.add('active');
                statusText.textContent = `Live data · Last update: ${time}`;
            } else {
                statusDot.classList.remove('active');
                statusText.textContent = `Offline · Last update: ${time}`;
            }
        }

        function showError(message) {
            elements.coinsList.innerHTML = `
                <tr>
                    <td colspan="5" style="text-align: center; padding: 60px 20px; color: #64748b;">
                        <div style="font-size: 32px; margin-bottom: 16px;">⚠️</div>
                        <div style="font-size: 16px; font-weight: 500; color: #e4e4e7; margin-bottom: 8px;">Unable to load data</div>
                        <div style="margin-bottom: 20px;">${message}</div>
                        <button class="btn btn-primary" onclick="location.reload()">Retry</button>
                    </td>
                </tr>
            `;
        }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'slideIn 0.3s ease-out reverse';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Start the app
        init();
    </script>
</body>
</html>
