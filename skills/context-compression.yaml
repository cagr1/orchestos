id: context-compression
version: 1.0.0
name: Context Compression
description: Generates a CONTEXT.md with the project's essential vocabulary — module names, conventions, abbreviations. Reduces tokens per run by replacing AGENTS.md in the prompt.
targets:
  - claude
  - cursor
  - openai
when_to_use:
  - Before starting a long multi-task session where AGENTS.md will be sent every run
  - When AGENTS.md exceeds 1500 tokens and most of it is boilerplate
  - When a new team member or LLM session keeps asking "what is X in this project?"
  - After a major refactor that changed module names or conventions
inputs_required:
  - AGENTS.md (project context file)
  - context.json (stack profile, if available)
  - Last 5–10 run descriptions from tasks.yaml (optional, improves domain coverage)
instructions: |
  Generate a CONTEXT.md that a fresh LLM session can use instead of AGENTS.md.
  Target: under 500 tokens. Every word must earn its place.

  Structure:

  **## Stack**
  One line: runtime, framework, DB, key libraries. Nothing else.
  Example: "Bun + TypeScript + SQLite (bun:sqlite). No ORM. Commander for CLI."

  **## Modules**
  Table with 3 columns: module path | what it does (one sentence) | key exports.
  Only modules that appear in more than one task or have non-obvious names.

  **## Conventions**
  Bullet list. Only project-specific rules that differ from defaults.
  Examples: "Tasks use kebab-case ids", "Providers always implement ProviderClient interface",
  "DB migrations use safeAddColumn, never DROP".
  Skip: "use TypeScript", "write clean code" — these are defaults.

  **## Abbreviations**
  Only if the project uses non-standard terms.
  Example: "QA = second LLM call that validates output. Not a human reviewer."

  **## Do not include**
  - Install instructions
  - Full file contents or code snippets
  - Anything already obvious from the stack line
  - History or decisions (those go in DONE.md)

  Save as CONTEXT.md in the project root.
  After saving, count tokens (rough estimate: words × 1.3). If > 500, cut the longest section by half.
anti_patterns:
  - Copy-paste sections from AGENTS.md without compressing
  - Include full file paths for every module — only non-obvious ones
  - Add "generated by orchestos" headers or timestamps — wastes tokens
  - Describe what each function does line by line
  - Include the same information in two sections
verifiers:
  - CONTEXT.md exists in project root
  - Token estimate is under 500 (word count × 1.3)
  - All module names used in recent tasks.yaml entries appear in ## Modules
  - No section is a copy-paste from AGENTS.md
examples:
  - title: Compress a 2000-token AGENTS.md
    input: "AGENTS.md with full install instructions, 15 module descriptions, stack overview"
    output: "CONTEXT.md: ## Stack (1 line) | ## Modules (8-row table, only non-obvious) | ## Conventions (4 bullets) | ## Abbreviations (2 entries). Total: ~380 tokens."
